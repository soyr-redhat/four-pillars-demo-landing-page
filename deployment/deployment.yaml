apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page
  namespace: four-pillars-demo-webapp-landing-page
  labels:
    app: landing-page
    pillar: all
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"landing-page:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"landing-page\")].image"}]'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      containers:
      - name: landing-page
        image: image-registry.openshift-image-registry.svc:5000/four-pillars-demo-webapp-landing-page/landing-page:latest
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: landing-page
  namespace: four-pillars-demo-webapp-landing-page
  labels:
    app: landing-page
spec:
  selector:
    app: landing-page
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: four-pillars-landing
  namespace: four-pillars-demo-webapp-landing-page
  labels:
    app: landing-page
spec:
  to:
    kind: Service
    name: landing-page
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
